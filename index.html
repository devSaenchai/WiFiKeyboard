<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB Wireless Controller</title>
    <style>
        :root {
            --bg-dark: #050505;
            --key-text: #ffffff;
            --transition-speed: 0.1s;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: var(--key-text);
            touch-action: none;
        }

        /* Moving RGB Wave Animation */
        @keyframes moveRGB {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rgb-flow {
            background: linear-gradient(270deg, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0000ff, #8000ff, #ff00ff);
            background-size: 400% 400%;
            animation: moveRGB 10s ease infinite;
        }

        #main-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%; height: 100%;
        }

        /* Top Bar */
        #toolbar {
            height: 45px;
            background: rgba(20, 20, 20, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #333;
        }

        .toggle-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Keyboard Grid */
        #keyboard-view {
            flex-grow: 1;
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 4px;
            padding: 6px;
            box-sizing: border-box;
        }

        .row {
            display: flex;
            gap: 4px;
            width: 100%;
        }

        .key {
            background: rgba(0, 0, 0, 0.950);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform var(--transition-speed);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        /* Highlighting key on press */
        .key.pressed {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px #fff;
            filter: brightness(1.5);
        }

        /* Specific Key Proportions */
        .key-small { flex: 0.7; }
        .key-med { flex: 1.5; }
        .key-wide { flex: 2; }
        .key-space { flex: 7; }

        /* Trackpad Pane */
        #trackpad-view {
            display: none;
            flex-direction: column;
            width: 100%; height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #touch-area {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.950);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .mouse-btns {
            display: flex;
            height: 80px;
            gap: 10px;
        }

        .m-btn {
            flex: 1;
            background: rgba(0, 0, 0, 0.950);
            border: 1px solid #444;
            color: white;
            font-size: 1.2rem;
            border-radius: 8px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="rgb-flow">

<div id="main-wrapper">
    <div id="toolbar">
        <button id="view-toggle" class="toggle-btn">SHOW TRACKPAD</button>
        <div id="status">● DISCONNECTED</div>
    </div>

    <div id="keyboard-view">
        <div class="row">
            <div class="key key-small" data-key="esc">Esc</div>
            <div class="key" data-key="f1">F1</div><div class="key" data-key="f2">F2</div>
            <div class="key" data-key="f3">F3</div><div class="key" data-key="f4">F4</div>
            <div class="key" data-key="f5">F5</div><div class="key" data-key="f6">F6</div>
            <div class="key" data-key="f7">F7</div><div class="key" data-key="f8">F8</div>
            <div class="key" data-key="f9">F9</div><div class="key" data-key="f10">F10</div>
            <div class="key" data-key="f11">F11</div><div class="key" data-key="f12">F12</div>
            <div class="key" data-key="delete">Del</div>
        </div>
        <div class="row">
            <div class="key" data-key="`">~</div>
            <div class="key" data-key="1">1</div><div class="key" data-key="2">2</div>
            <div class="key" data-key="3">3</div><div class="key" data-key="4">4</div>
            <div class="key" data-key="5">5</div><div class="key" data-key="6">6</div>
            <div class="key" data-key="7">7</div><div class="key" data-key="8">8</div>
            <div class="key" data-key="9">9</div><div class="key" data-key="0">0</div>
            <div class="key" data-key="-">-</div><div class="key" data-key="=">=</div>
            <div class="key key-med" data-key="backspace">Backspace</div>
        </div>
        <div class="row">
            <div class="key key-med" data-key="tab">Tab</div>
            <div class="key" data-key="q">Q</div><div class="key" data-key="w">W</div>
            <div class="key" data-key="e">E</div><div class="key" data-key="r">R</div>
            <div class="key" data-key="t">T</div><div class="key" data-key="y">Y</div>
            <div class="key" data-key="u">U</div><div class="key" data-key="i">I</div>
            <div class="key" data-key="o">O</div><div class="key" data-key="p">P</div>
            <div class="key" data-key="[">[</div><div class="key" data-key="]">]</div>
            <div class="key" data-key="\">\</div>
        </div>
        <div class="row">
            <div class="key key-med" data-key="capslock">Caps</div>
            <div class="key" data-key="a">A</div><div class="key" data-key="s">S</div>
            <div class="key" data-key="d">D</div><div class="key" data-key="f">F</div>
            <div class="key" data-key="g">G</div><div class="key" data-key="h">H</div>
            <div class="key" data-key="j">J</div><div class="key" data-key="k">K</div>
            <div class="key" data-key="l">L</div><div class="key" data-key=";">;</div>
            <div class="key" data-key="'">'</div>
            <div class="key key-wide" data-key="enter">Enter</div>
        </div>
        <div class="row">
            <div class="key key-wide" data-key="shift">Shift</div>
            <div class="key" data-key="z">Z</div><div class="key" data-key="x">X</div>
            <div class="key" data-key="c">C</div><div class="key" data-key="v">V</div>
            <div class="key" data-key="b">B</div><div class="key" data-key="n">N</div>
            <div class="key" data-key="m">M</div><div class="key" data-key=",">,</div>
            <div class="key" data-key=".">.</div><div class="key" data-key="/">/</div>
            <div class="key" data-key="up">▲</div>
            <div class="key key-wide" data-key="shift">Shift</div>
        </div>
        <div class="row">
            <div class="key" data-key="ctrl">Ctrl</div>
            <div class="key" data-key="win">Win</div>
            <div class="key" data-key="alt">Alt</div>
            <div class="key key-space" data-key="space">Space</div>
            <div class="key" data-key="alt">Alt</div>
            <div class="key" data-key="left">◄</div>
            <div class="key" data-key="down">▼</div>
            <div class="key" data-key="right">►</div>
        </div>
    </div>

    <div id="trackpad-view">
        <div id="touch-area"></div>
        <div class="mouse-btns">
            <button class="m-btn" id="l-btn">Left Click</button>
            <button class="m-btn" id="r-btn">Right Click</button>
        </div>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    const PC_IP = "10.53.95.130"; // <-- REPLACE WITH YOUR PC IP
    const socket = new WebSocket(`ws://${PC_IP}:8765`);
    
    const statusEl = document.getElementById('status');
    const kbView = document.getElementById('keyboard-view');
    const tpView = document.getElementById('trackpad-view');
    const toggleBtn = document.getElementById('view-toggle');

    // --- 2. WEBSOCKET LOGIC ---
    socket.onopen = () => {
        statusEl.innerText = "● CONNECTED";
        statusEl.style.color = "#00ff00";
    };
    socket.onclose = () => {
        statusEl.innerText = "● DISCONNECTED";
        statusEl.style.color = "#ff0000";
    };

    function send(data) {
        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify(data));
        }
    }

    // --- 3. VIEW SWITCHER ---
    toggleBtn.onclick = () => {
        if (kbView.classList.contains('hidden')) {
            kbView.classList.remove('hidden');
            tpView.style.display = 'none';
            toggleBtn.innerText = "SHOW TRACKPAD";
        } else {
            kbView.classList.add('hidden');
            tpView.style.display = 'flex';
            toggleBtn.innerText = "SHOW KEYBOARD";
        }
    };

    // --- 4. KEYBOARD EVENTS ---
    document.querySelectorAll('.key').forEach(key => {
        key.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const k = key.getAttribute('data-key');
            key.classList.add('pressed');
            if (navigator.vibrate) navigator.vibrate(15);
            send({ type: 'keydown', key: k });
        });

        key.addEventListener('touchend', (e) => {
            const k = key.getAttribute('data-key');
            key.classList.remove('pressed');
            send({ type: 'keyup', key: k });
        });
    });

    // --- 5. TRACKPAD EVENTS ---
    const touchArea = document.getElementById('touch-area');
    let lastX = 0, lastY = 0;

    touchArea.addEventListener('touchstart', (e) => {
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    });

    touchArea.addEventListener('touchmove', (e) => {
        const dx = (e.touches[0].clientX - lastX) * 2; // Sensitivity multiplier
        const dy = (e.touches[0].clientY - lastY) * 2;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        send({ type: 'mousemove', x: dx, y: dy });
    });

    document.getElementById('l-btn').ontouchstart = () => send({ type: 'click', button: 'left' });
    document.getElementById('r-btn').ontouchstart = () => send({ type: 'click', button: 'right' });

</script>
</body>
</html>
